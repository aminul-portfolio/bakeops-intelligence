{% load static %}
<aside class="analytics-sidebar ref-sidebar" aria-label="BakeOps analytics navigation">
    <div class="analytics-brand-block ref-brand-block">
        <div class="analytics-brand-mark ref-brand-mark" aria-hidden="true">
            <span>BO</span>
        </div>
        <div>
            <p class="analytics-brand-kicker">BakeOps</p>
            <h1>Intelligence</h1>
        </div>
    </div>

    <nav class="analytics-nav-list ref-nav-list" aria-label="Analytics pages">
        <a class="analytics-nav-link {% if active_page == 'dashboard' %}is-active{% endif %}" href="{% url 'bakeops:analytics-dashboard' %}" {% if active_page == 'dashboard' %}aria-current="page"{% endif %}>
            <span class="analytics-nav-icon" aria-hidden="true">
                <svg viewBox="0 0 16 16" fill="none"><rect x="1.5" y="1.5" width="5" height="5" rx="1.2" stroke="currentColor" stroke-width="1.3"/><rect x="9.5" y="1.5" width="5" height="5" rx="1.2" stroke="currentColor" stroke-width="1.3"/><rect x="1.5" y="9.5" width="5" height="5" rx="1.2" stroke="currentColor" stroke-width="1.3"/><rect x="9.5" y="9.5" width="5" height="5" rx="1.2" stroke="currentColor" stroke-width="1.3"/></svg>
            </span>
            <span>Dashboard</span>
        </a>

        <a class="analytics-nav-link {% if active_page == 'products' %}is-active{% endif %}" href="{% url 'bakeops:product-profitability' %}" {% if active_page == 'products' %}aria-current="page"{% endif %}>
            <span class="analytics-nav-icon" aria-hidden="true">
                <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.3" stroke="currentColor" stroke-width="1.3"/><path d="M8 8V1.7A6.3 6.3 0 0 1 14.3 8H8Z" fill="currentColor" opacity="0.35"/><circle cx="8" cy="8" r="1.8" fill="currentColor" opacity="0.5"/></svg>
            </span>
            <span>Product Profitability</span>
        </a>

        <a class="analytics-nav-link {% if active_page == 'ingredients' %}is-active{% endif %}" href="{% url 'bakeops:ingredient-risk' %}" {% if active_page == 'ingredients' %}aria-current="page"{% endif %}>
            <span class="analytics-nav-icon" aria-hidden="true">
                <svg viewBox="0 0 16 16" fill="none"><path d="M8 1.8 14.4 13a1.1 1.1 0 0 1-1 1.7H2.6A1.1 1.1 0 0 1 1.6 13L8 1.8Z" stroke="currentColor" stroke-width="1.3"/><path d="M8 5.6v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="12.2" r="0.9" fill="currentColor"/></svg>
            </span>
            <span>Ingredient Risk</span>
        </a>

        <a class="analytics-nav-link {% if active_page == 'waste' %}is-active{% endif %}" href="{% url 'bakeops:waste-analysis' %}" {% if active_page == 'waste' %}aria-current="page"{% endif %}>
            <span class="analytics-nav-icon" aria-hidden="true">
                <svg viewBox="0 0 16 16" fill="none"><path d="M8 2 14 8l-6 6-6-6 6-6Z" stroke="currentColor" stroke-width="1.3"/><circle cx="8" cy="8" r="2" fill="currentColor" opacity="0.35"/></svg>
            </span>
            <span>Waste Analysis</span>
        </a>

        <a class="analytics-nav-link {% if active_page == 'occasions' %}is-active{% endif %}" href="{% url 'bakeops:occasion-analytics' %}" {% if active_page == 'occasions' %}aria-current="page"{% endif %}>
            <span class="analytics-nav-icon" aria-hidden="true">
                <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.2" stroke="currentColor" stroke-width="1.3"/><path d="M8 3.8v4.4l3.1 1.8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M8 8h5.7" stroke="currentColor" stroke-width="1.2" opacity="0.45"/></svg>
            </span>
            <span>Occasion Analytics</span>
        </a>

        <a class="analytics-nav-link {% if active_page == 'customers' %}is-active{% endif %}" href="{% url 'bakeops:customer-analytics' %}" {% if active_page == 'customers' %}aria-current="page"{% endif %}>
            <span class="analytics-nav-icon" aria-hidden="true">
                <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5.2" r="2.4" stroke="currentColor" stroke-width="1.3"/><path d="M3.3 13.8c.7-2.4 2.4-3.7 4.7-3.7s4 1.3 4.7 3.7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            </span>
            <span>Customer Analytics</span>
        </a>

        <a class="analytics-nav-link {% if active_page == 'data_quality' %}is-active{% endif %}" href="{% url 'bakeops:data-quality-review' %}" {% if active_page == 'data_quality' %}aria-current="page"{% endif %}>
            <span class="analytics-nav-icon" aria-hidden="true">
                <svg viewBox="0 0 16 16" fill="none"><path d="M3 8.2 6.6 12 13.2 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <span>Data Quality Review</span>
        </a>

        <a class="analytics-nav-link {% if active_page == 'exports' %}is-active{% endif %}" href="{% url 'bakeops:export-centre' %}" {% if active_page == 'exports' %}aria-current="page"{% endif %}>
            <span class="analytics-nav-icon" aria-hidden="true">
                <svg viewBox="0 0 16 16" fill="none"><path d="M8 2.2v7.4m0 0L5.2 6.8M8 9.6l2.8-2.8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 13.4h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" opacity="0.75"/></svg>
            </span>
            <span>Export Centre</span>
        </a>
    </nav>

    <div class="analytics-sidebar-spacer" aria-hidden="true"></div>

    <section class="analytics-sidebar-card ref-workspace-card" aria-label="Current workspace">
        <span class="analytics-sidebar-label">Workspace</span>
        <strong>SweetCakes Bakery</strong>
        <small>Seeded demo data · evidence mode</small>
    </section>

    <div class="analytics-reviewer-chip ref-reviewer-chip" aria-label="Reviewer mode">
        <span class="analytics-reviewer-avatar" aria-hidden="true">BI</span>
        <div>
            <strong>Reviewer</strong>
            <small>Portfolio evidence mode</small>
        </div>
    </div>

    <div class="ref-sidebar-tools" role="toolbar" aria-label="Sidebar utilities">
        <button type="button" aria-label="Settings">⚙</button>
        <button type="button" aria-label="Help">?</button>
        <button type="button" aria-label="Recent activity">◷</button>
        <button type="button" aria-label="Refresh status">◌</button>
    </div>

    <button class="ref-sidebar-collapse" type="button" aria-label="Collapse sidebar">
        <span aria-hidden="true">⌫</span>
        <small>Collapse</small>
    </button>
</aside>
